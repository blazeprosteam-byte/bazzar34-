<!DOCTYPE html>
<html>
<head>
    <title>Hypixel Bazaar Flips</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial; background: #111; color: #eee; text-align: center; }
        table { margin: auto; border-collapse: collapse; width: 80%; }
        th, td { padding: 10px; border-bottom: 1px solid #444; }
        th { background: #222; }
        tr:hover { background: #333; }
        canvas { max-width: 800px; margin: 30px auto; }
        .good { color: #00ff88; }
        .warn { color: #ffcc00; }
        .bad { color: #ff4444; }
    </style>
</head>

<body>
    <h1>Hypixel Bazaar AI Flip Tool</h1>

    <h2>🔥 Best Flip Right Now</h2>
    <div id="bestFlip" style="font-size:18px;"></div>

    <table id="flipTable">
        <tr>
            <th>Item</th>
            <th>Buy Price</th>
            <th>Profit</th>
            <th>ROI (%)</th>
            <th>AI Signal</th>
        </tr>
    </table>

    <h2>📈 Price Trend (Top Item)</h2>
    <canvas id="chart"></canvas>

<script>
let chart;

function savePriceHistory(item, price) {
    let history = JSON.parse(localStorage.getItem(item) || "[]");
    history.push({ time: Date.now(), price });
    if (history.length > 30) history.shift();
    localStorage.setItem(item, JSON.stringify(history));
}

function drawChart(item) {
    let history = JSON.parse(localStorage.getItem(item) || "[]");

    const labels = history.map(p => new Date(p.time).toLocaleTimeString());
    const data = history.map(p => p.price);

    if (chart) chart.destroy();

    const ctx = document.getElementById("chart");

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: [{
                label: item,
                data,
                borderColor: '#00ff99',
                fill: false
            }]
        }
    });
}

function aiDecision(item) {
    const roi = item.roi;

    const volatilityPenalty = Math.random() * 10;
    const manipulationRisk = roi > 200 ? 30 : 0;

    const score = roi - volatilityPenalty - manipulationRisk;

    if (roi < 5) return "❌ AVOID";
    if (score > 40) return "🟢 BUY NOW";
    if (score > 20) return "🟡 WAIT";
    return "❌ AVOID";
}

function detectMarket(items) {
    const avgROI = items.reduce((a,b)=>a+b.roi,0) / items.length;

    if (avgROI < 2) return "🚨 MARKET CRASH DETECTED";
    if (avgROI < 5) return "⚠️ WEAK MARKET";
    return "🟢 STABLE MARKET";
}

async function getFlips() {
    const res = await fetch("https://api.hypixel.net/skyblock/bazaar");
    const data = await res.json();

    if (!data.success) return;

    const products = data.products;
    let results = [];

    for (const id in products) {
        const stats = products[id].quick_status;

        const buy_price = stats.sellPrice;
        const sell_price = stats.buyPrice;

        const tax = sell_price * 0.01125;
        const net_profit = sell_price - buy_price - tax;

        if (buy_price <= 0 || net_profit <= 0) continue;

        const roi = (net_profit / buy_price) * 100;

        // anti manipulation filter
        if (stats.sellMovingWeek < 50000 || roi > 500) continue;

        results.push({
            name: id.replaceAll("_"," "),
            buy_at: buy_price,
            profit: net_profit,
            roi
        });
    }

    results.sort((a,b)=>b.roi-a.roi);
    results = results.slice(0,10);

    document.getElementById("bestFlip").innerHTML = `
        🟢 <b>${results[0].name}</b><br>
        Profit: ${results[0].profit.toFixed(1)}<br>
        ROI: ${results[0].roi.toFixed(2)}%<br><br>
        <b>${detectMarket(results)}</b>
    `;

    const table = document.getElementById("flipTable");

    table.innerHTML = `
        <tr>
            <th>Item</th>
            <th>Buy Price</th>
            <th>Profit</th>
            <th>ROI (%)</th>
            <th>AI Signal</th>
        </tr>
    `;

    results.forEach((flip,i)=>{
        const row = table.insertRow();

        const signal = aiDecision(flip);

        row.innerHTML = `
            <td>${flip.name}</td>
            <td>${flip.buy_at.toFixed(1)}</td>
            <td>${flip.profit.toFixed(1)}</td>
            <td>${flip.roi.toFixed(2)}</td>
            <td>${signal}</td>
        `;

        if(i===0){
            savePriceHistory(flip.name, flip.buy_at);
            drawChart(flip.name);
        }
    });
}

getFlips();
setInterval(getFlips, 5000);
</script>
</body>
</html>
