<!DOCTYPE html>
<html>
<head>
    <title>Hypixel Bazaar AI Flip Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>
        body { font-family: Arial; background:#111; color:#eee; text-align:center; }
        table { margin:auto; width:85%; border-collapse:collapse; }
        th, td { padding:10px; border-bottom:1px solid #444; }
        th { background:#222; }
        canvas { max-width:900px; margin:20px auto; }
    </style>
</head>

<body>

<h1>Hypixel AI Flip Tool</h1>

<h2 id="status">Connecting...</h2>
<h2 id="best">Loading...</h2>

<canvas id="chart"></canvas>

<table>
<thead>
<tr>
    <th>Item</th>
    <th>Price</th>
    <th>ROI</th>
    <th>Signal</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
const socket = io("http://localhost:3000");
let chart;

/* -------------------------------
   REAL FLIP CALC (CLEAN VERSION)
--------------------------------*/
function calculateFlip(stats) {
    const buyPrice = stats.sellPrice;
    const sellPrice = stats.buyPrice;

    const buyVolume = stats.buyMovingWeek || 1;
    const sellVolume = stats.sellMovingWeek || 1;

    const spread = sellPrice - buyPrice;
    const tax = sellPrice * 0.01125;

    const netProfit = spread - tax;
    const roi = (netProfit / buyPrice) * 100;

    const demandBalance = buyVolume / (sellVolume + 1);
    const liquidity = Math.log10(buyVolume + sellVolume);

    const confidence =
        (spread > 0 ? 30 : -30) +
        (demandBalance > 1 ? 20 : -10) +
        (liquidity * 5) +
        (roi > 10 ? 20 : -10);

    return { buyPrice, sellPrice, netProfit, roi, confidence };
}

/* -------------------------------
   SOCKET LIVE MARKET FEED
--------------------------------*/
socket.on("marketUpdate", (data) => {

    document.getElementById("status").innerText = data.marketStatus;
    document.getElementById("best").innerText = "🔥 " + data.best.name;

    const table = document.getElementById("table");
    table.innerHTML = "";

    data.items.forEach(i => {

        const signal =
            i.roi > 20 ? "BUY" :
            i.roi > 5 ? "WAIT" : "AVOID";

        table.innerHTML += `
            <tr>
                <td>${i.name}</td>
                <td>${i.price.toFixed(1)}</td>
                <td>${i.roi.toFixed(2)}</td>
                <td>${signal}</td>
            </tr>
        `;
    });

    /* ---------------- chart ---------------- */
    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            labels: data.history.map(x =>
                new Date(x.time).toLocaleTimeString()
            ),
            datasets: [{
                label: "Market Price",
                data: data.history.map(x => x.price),
                borderColor: "#00ff99",
                fill: false
            }]
        }
    });
});

</script>

</body>
</html>
