<!DOCTYPE html>
<html>
<head>
    <title>Hypixel Bazaar AI Flip Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>
        body { font-family: Arial; background:#111; color:#eee; text-align:center; }
        table { margin:auto; width:85%; border-collapse:collapse; }
        th, td { padding:10px; border-bottom:1px solid #444; }
        th { background:#222; }
        canvas { max-width:900px; margin:20px auto; }
        #status { color:#ffcc00; }
    </style>
</head>
<body>

<h1>Hypixel AI Flip Tool</h1>

<h2 id="status">Connecting to server...</h2>
<h2 id="best">Loading...</h2>

<canvas id="chart"></canvas>

<table>
<thead>
<tr>
    <th>Item</th>
    <th>Price</th>
    <th>ROI</th>
    <th>Signal</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
let chart;
let socket;

function setStatus(msg, color="#ffcc00"){
    const el = document.getElementById("status");
    el.innerText = msg;
    el.style.color = color;
}

function connectSocket(){
    setStatus("Connecting WebSocket...");

    socket = io("http://localhost:3000", {
        reconnection: true,
        timeout: 5000
    });

    socket.on("connect", () => {
        setStatus("LIVE WebSocket Connected", "#00ff99");
    });

    socket.on("disconnect", () => {
        setStatus("Disconnected - retrying...");
    });

    socket.on("marketUpdate", (data) => {
        render(data);
    });

    /* fallback if server never responds */
    setTimeout(() => {
        if (!socket.connected) {
            setStatus("WebSocket failed - fallback mode", "#ff4444");
            startFallback();
        }
    }, 6000);
}

function startFallback(){
    setInterval(async () => {
        try {
            const res = await fetch("https://api.hypixel.net/skyblock/bazaar");
            const data = await res.json();

            render({
                marketStatus: "FALLBACK",
                best: { name: "API Mode" },
                items: [],
                history: []
            });
        } catch (e) {
            setStatus("API failed", "#ff4444");
        }
    }, 5000);
}

function render(data){
    document.getElementById("best").innerText = "🔥 " + data.best.name;

    const table = document.getElementById("table");
    table.innerHTML = "";

    data.items.forEach(i => {
        const signal = i.roi > 20 ? "BUY" : i.roi > 5 ? "WAIT" : "AVOID";

        table.innerHTML += `
            <tr>
                <td>${i.name}</td>
                <td>${i.price.toFixed(1)}</td>
                <td>${i.roi.toFixed(2)}</td>
                <td>${signal}</td>
</html>
