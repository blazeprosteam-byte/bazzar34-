<!DOCTYPE html>
<html>
<head>
    <title>Pro Bazaar Trading Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    background:#0b0f14;
    color:#e6e6e6;
    margin:0;
}

.header{
    padding:15px;
    background:#111827;
    border-bottom:1px solid #222;
}

.container{
    display:grid;
    grid-template-columns:280px 1fr;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    background:#0f172a;
    padding:10px;
    border-right:1px solid #222;
}

.sidebar input,
.sidebar select{
    width:100%;
    padding:8px;
    background:#111827;
    color:white;
    border:none;
    margin-bottom:8px;
}

/* MAIN */
.main{
    padding:15px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#0f172a;
}

th,td{
    padding:8px;
    border-bottom:1px solid #222;
    text-align:center;
}

th{
    background:#111827;
}

.buy{ color:#00ff88; font-weight:bold; }
.wait{ color:#ffcc00; }
.avoid{ color:#ff4444; }

canvas{
    margin-top:10px;
    background:#0f172a;
    border-radius:8px;
    padding:10px;
}

.itemRow{
    padding:8px;
    border-bottom:1px solid #222;
    cursor:pointer;
}

.itemRow:hover{
    background:#111827;
}

#allItems{
    max-height:260px;
    overflow:auto;
    border:1px solid #222;
    border-radius:8px;
    background:#0f172a;
}
</style>

</head>

<body>

<div class="header">
    <h2>🤖 Pro Bazaar Trading Terminal</h2>
    <span id="status">Loading...</span>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

    <h3>🔍 Search Bazaar</h3>
    <input id="search" placeholder="Search item..." oninput="searchBazaar()">

    <h3>🎯 Select Item</h3>
    <select id="itemSelect" onchange="updateCharts()"></select>

    <h3>📦 All Items</h3>
    <div id="allItems"></div>

</div>

<!-- MAIN -->
<div class="main">

    <h3>📊 24H Trend</h3>
    <canvas id="dayChart"></canvas>

    <h3>📊 Top AI Trades</h3>
    <table id="table"></table>

</div>
</div>

<script>

const TAX = 0.01125;

let dayChart;
let allMarketItems = [];

/* =========================
   HISTORY SYSTEM
========================= */
function saveHistory(item, price){
    if(!item) return;

    let data = JSON.parse(localStorage.getItem(item) || "[]");
    data.push({ time: Date.now(), price });

    if (data.length > 300) data.shift();

    localStorage.setItem(item, JSON.stringify(data));
}

function getHistory(item){
    return JSON.parse(localStorage.getItem(item) || "[]");
}

/* =========================
   REGRESSION
========================= */
function regression(h){
    if(!h || h.length < 10) return null;

    let n=h.length,sx=0,sy=0,sxy=0,sxx=0;

    for(let i=0;i<n;i++){
        sx+=i;
        sy+=h[i].price;
        sxy+=i*h[i].price;
        sxx+=i*i;
    }

    let denom = (n*sxx - sx*sx);
    if(denom === 0) return null;

    let slope = (n*sxy - sx*sy)/denom;
    let intercept = (sy - slope*sx)/n;

    return slope*n + intercept;
}

/* =========================
   TREND + SCORE
========================= */
function trend(h){
    if(!h || h.length < 20) return "STABLE";

    let s=regression(h.slice(-10));
    let l=regression(h.slice(-50));

    if(!s || !l) return "STABLE";

    if(s > l*1.01) return "UP";
    if(s < l*0.99) return "DOWN";
    return "STABLE";
}

function pump(h){
    if(!h || h.length < 10) return false;

    let avg = h.reduce((a,b)=>a+b.price,0)/h.length;
    return h[h.length-1].price > avg*1.25;
}

function score(item,h){
    let t = trend(h);
    let s = item.roi || 0;

    if(t==="UP") s+=20;
    if(t==="DOWN") s-=30;
    if(pump(h)) s-=50;

    return s;
}

function signal(item,h){
    if(!h || h.length < 10) return "WAIT DATA";

    let p = regression(h);
    let c = h[h.length-1].price;

    if(pump(h)) return "❌ MANIPULATION";
    if(p && p > c*1.02) return "🟢 BUY EARLY";
    if(item.roi > 5) return "🟡 WAIT";

    return "❌ AVOID";
}

/* =========================
   SEARCH
========================= */
function searchBazaar(){
    let q=document.getElementById("search").value.toLowerCase();

    if(!q){
        renderAll(allMarketItems);
        return;
    }

    let filtered = allMarketItems.filter(i =>
        i.name.toLowerCase().includes(q)
    );

    renderAll(filtered);
}

/* =========================
   ALL ITEMS
========================= */
function renderAll(items){

    let box=document.getElementById("allItems");
    box.innerHTML="";

    items.slice(0,200).forEach(i=>{

        let div=document.createElement("div");
        div.className="itemRow";

        div.innerHTML=`<b>${i.name}</b><br><small>${i.price.toFixed(1)} | ${i.roi.toFixed(2)}%</small>`;

        div.onclick=()=>{
            document.getElementById("itemSelect").value=i.name;
            updateCharts();
        };

        box.appendChild(div);
    });
}

/* =========================
   CHART
========================= */
function updateCharts(){

    let sel=document.getElementById("itemSelect");
    if(!sel.value) return;

    let h=getHistory(sel.value).slice(-50);

    if(h.length===0) return;

    let labels=h.map(x=>new Date(x.time).toLocaleTimeString());
    let data=h.map(x=>x.price);

    if(!dayChart){
        dayChart=new Chart(document.getElementById("dayChart"),{
            type:"line",
            data:{labels,datasets:[{data,borderColor:"#00ff99"}]}
        });
    } else {
        dayChart.data.labels=labels;
        dayChart.data.datasets[0].data=data;
        dayChart.update();
    }
}

/* =========================
   LOAD MARKET
========================= */
async function load(){

    try{

        let res=await fetch("https://api.hypixel.net/skyblock/bazaar");
        let data=await res.json();

        let items=[];

        for(let id in data.products){

            let s=data.products[id].quick_status;
            if(!s) continue;

            let buy=s.sellPrice;
            let sell=s.buyPrice;

            if(!buy||!sell) continue;

            let profit=(sell-buy)-(sell*TAX);
            let roi=(profit/buy)*100;

            if(s.sellMovingWeek<100000) continue;

            let name=id.replaceAll("_"," ");

            saveHistory(name,buy);

            let h=getHistory(name);

            items.push({
                name,
                price:buy,
                roi,
                score:score({roi},h),
                signal:signal({roi},h)
            });
        }

        allMarketItems = items.slice();

        renderAll(allMarketItems);

        items.sort((a,b)=>b.score-a.score);
        items=items.slice(0,15);

        render(items);

        document.getElementById("status").innerText="🟢 LIVE";

    } catch(e){
        document.getElementById("status").innerText="❌ ERROR";
    }
}

/* =========================
   RENDER
========================= */
function render(items){

    let table=document.getElementById("table");
    let sel=document.getElementById("itemSelect");

    table.innerHTML=`<tr><th>Item</th><th>Price</th><th>ROI</th><th>Score</th><th>Signal</th></tr>`;
    sel.innerHTML="";

    items.forEach((i,idx)=>{

        table.innerHTML+=`
        <tr>
            <td>${i.name}</td>
            <td>${i.price.toFixed(1)}</td>
            <td>${i.roi.toFixed(2)}</td>
            <td>${i.score.toFixed(1)}</td>
            <td>${i.signal}</td>
        </tr>`;

        let opt=document.createElement("option");
        opt.value=i.name;
        opt.text=i.name;
        sel.appendChild(opt);

        if(idx===0) updateCharts();
    });
}

/* =========================
   🚀 STABLE LOOP (5 SECONDS)
========================= */
async function loop(){
    await load();
    setTimeout(loop, 5000); // ✅ FIXED
}

loop();

</script>

</body>
</html>
