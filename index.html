<script>

const TAX = 0.01125;
let dayChart, weekChart;

/* =========================
   💾 HISTORY SYSTEM
========================= */
function saveHistory(item, price){
    let data = JSON.parse(localStorage.getItem(item) || "[]");
    data.push({ time: Date.now(), price });
    if (data.length > 500) data.shift();
    localStorage.setItem(item, JSON.stringify(data));
}

function getHistory(item){
    return JSON.parse(localStorage.getItem(item) || "[]");
}

/* =========================
   🥇 WIN / LOSS TRACKING
========================= */
function getTradeStats(item){
    let data = JSON.parse(localStorage.getItem("trades_" + item) || "{}");
    return {
        wins: data.wins || 0,
        losses: data.losses || 0
    };
}

function logTrade(item, entryPrice){
    let key = "trades_" + item;
    let data = JSON.parse(localStorage.getItem(key) || "{}");

    if(!data.wins) data.wins = 0;
    if(!data.losses) data.losses = 0;

    setTimeout(()=>{
        const history = getHistory(item);
        const current = history[history.length - 1]?.price;

        if(!current) return;

        if(current > entryPrice){
            data.wins++;
        } else {
            data.losses++;
        }

        localStorage.setItem(key, JSON.stringify(data));
    }, 60000); // 1 min evaluation
}

/* =========================
   📉 REGRESSION MODEL
========================= */
function regression(history){
    if (history.length < 10) return null;

    let n = history.length;
    let sx=0, sy=0, sxy=0, sxx=0;

    for(let i=0;i<n;i++){
        let x=i, y=history[i].price;
        sx+=x; sy+=y; sxy+=x*y; sxx+=x*x;
    }

    let slope = (n*sxy - sx*sy)/(n*sxx - sx*sx);
    let intercept = (sy - slope*sx)/n;

    return slope*n + intercept;
}

/* =========================
   🥉 SHORT vs LONG TREND
========================= */
function trendSignal(history){
    const short = regression(history.slice(-10));
    const long = regression(history.slice(-50));

    if(!short || !long) return "STABLE";

    if(short > long * 1.01) return "MOMENTUM_UP";
    if(short < long * 0.99) return "DUMPING";
    return "STABLE";
}

/* =========================
   🥈 MARKET CRASH DETECTOR
========================= */
function marketCrash(items){
    let avgROI = items.reduce((a,i)=>a+i.roi,0)/items.length;
    return avgROI < -2;
}

/* =========================
   📉 PUMP DETECTION
========================= */
function detectPump(history){
    if (history.length < 10) return false;

    const last = history[history.length-1].price;
    const avg = history.reduce((a,b)=>a+b.price,0)/history.length;

    return last > avg * 1.25;
}

/* =========================
   📊 VOLATILITY
========================= */
function volatility(history){
    let avg = history.reduce((a,b)=>a+b.price,0)/history.length;

    let variance = history.reduce((a,p)=>
        a + Math.pow(p.price-avg,2),0)/history.length;

    return Math.sqrt(variance);
}

/* =========================
   📈 SMART SCORE
========================= */
function score(item, history){
    const trend = trendSignal(history);
    const vol = volatility(history);

    let s = 0;

    s += item.roi * 0.5;

    if(trend === "MOMENTUM_UP") s += 25;
    if(trend === "DUMPING") s -= 30;

    if(vol < item.price * 0.05) s += 10;

    if(detectPump(history)) s -= 50;

    return s;
}

/* =========================
   🤖 SIGNAL ENGINE (UPDATED)
========================= */
function signal(item, history){
    const pred = regression(history);
    const current = history[history.length-1].price;
    const trend = trendSignal(history);

    if(detectPump(history)) return "❌ MANIPULATION";
    if(trend === "DUMPING") return "❌ DUMPING MARKET";

    if(pred && pred > current * 1.02 && item.roi > 5){
        logTrade(item.name, current); // 🥇 LOG TRADE
        return "🟢 BUY EARLY";
    }

    if(pred && pred > current)
        return "🟢 BUY";

    if(item.roi > 5)
        return "🟡 WAIT";

    return "❌ AVOID";
}

/* =========================
   🚀 MAIN LOOP
========================= */
async function load(){
    document.getElementById("status").innerText = "Fetching...";

    const res = await fetch("https://api.hypixel.net/skyblock/bazaar");
    const data = await res.json();

    let items = [];

    for (const id in data.products){
        const stats = data.products[id].quick_status;

        const buy = stats.sellPrice;
        const sell = stats.buyPrice;

        if (buy <= 0 || sell <= 0) continue;

        const profit = (sell - buy) - (sell * TAX);
        const roi = (profit / buy) * 100;

        if (stats.sellMovingWeek < 100000) continue;

        const name = id.replaceAll("_"," ");

        saveHistory(name, buy);

        const history = getHistory(name);

        const sc = score({ roi, price: buy }, history);
        const sig = signal({ name, roi }, history);

        items.push({
            name,
            price: buy,
            roi,
            score: sc,
            signal: sig
        });
    }

    /* 🥈 MARKET CRASH CHECK */
    const crash = marketCrash(items);

    items.sort((a,b)=>b.score-a.score);
    items = items.slice(0, 15);

    render(items);

    document.getElementById("status").innerText =
        crash
        ? "🚨 MARKET CRASH DETECTED"
        : "Updated " + new Date().toLocaleTimeString();
}

/* =========================
   🧾 RENDER
========================= */
function render(items){
    const table = document.getElementById("table");
    const select = document.getElementById("itemSelect");

    table.innerHTML = `
        <tr>
            <th>Item</th>
            <th>Price</th>
            <th>ROI</th>
            <th>Score</th>
            <th>Signal</th>
        </tr>
    `;

    select.innerHTML = "";

    items.forEach((i,idx)=>{

        table.innerHTML += `
            <tr>
                <td>${i.name}</td>
                <td>${i.price.toFixed(1)}</td>
                <td>${i.roi.toFixed(2)}</td>
                <td>${i.score.toFixed(1)}</td>
                <td class="${i.signal.includes('BUY')?'buy':i.signal.includes('WAIT')?'wait':'avoid'}">
                    ${i.signal}
                </td>
            </tr>
        `;

        const opt = document.createElement("option");
        opt.value = i.name;
        opt.text = i.name;
        select.appendChild(opt);

        if(idx === 0) updateCharts();
    });
}

/* =========================
   ⚡ LOOP
========================= */
async function loop(){
    await load();
    setTimeout(loop, 3000);
}

loop();

</script>
