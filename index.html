<!DOCTYPE html>
<html>
<head>
    <title>Pro Bazaar Trading Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    background:#0b0f14;
    color:#e6e6e6;
    margin:0;
}

.header{
    padding:15px;
    background:#111827;
    border-bottom:1px solid #222;
}

.container{
    display:grid;
    grid-template-columns:280px 1fr;
    height:100vh;
}

.sidebar{
    background:#0f172a;
    padding:10px;
    border-right:1px solid #222;
}

.sidebar select{
    width:100%;
    padding:8px;
    background:#111827;
    color:white;
    border:none;
}

.main{
    padding:15px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#0f172a;
}

th,td{
    padding:8px;
    border-bottom:1px solid #222;
    text-align:center;
}

th{ background:#111827; }

canvas{
    margin-top:10px;
    background:#0f172a;
    border-radius:8px;
    padding:10px;
}

.buy{ color:#00ff88; font-weight:bold; }
.wait{ color:#ffcc00; }
.avoid{ color:#ff4444; }

.featured{
    margin-top:10px;
    padding:10px;
    background:#111827;
    border-left:4px solid #00ff88;
}
</style>

</head>

<body>

<div class="header">
    <h2>🤖 Pro Bazaar Trading Terminal</h2>
    <span id="status">Loading...</span>
</div>

<div class="container">

<div class="sidebar">
    <h3>🎯 Select Item</h3>
    <select id="itemSelect" onchange="updateCharts()"></select>

    <div class="featured">
        <h3>🔥 Stable Items</h3>
        🟣 Recombobulator 3000<br>
        🍪 Booster Cookie
    </div>
</div>

<div class="main">

    <h3>📊 Price Chart</h3>
    <canvas id="chart"></canvas>

    <h3>📊 Top Bazaar Flips</h3>
    <table id="table"></table>

</div>

</div>

<script>

const TAX = 0.01125;

let chart;
let marketItems = [];

/* =========================
   HISTORY SAFE STORAGE
========================= */
function saveHistory(item, price){
    if(!item || !price) return;

    let data = JSON.parse(localStorage.getItem(item) || "[]");
    data.push({ time: Date.now(), price });

    if(data.length > 200) data.shift();

    localStorage.setItem(item, JSON.stringify(data));
}

function getHistory(item){
    return JSON.parse(localStorage.getItem(item) || "[]");
}

/* =========================
   SAFE API FETCH
========================= */
async function getBazaar(){
    try {
        const res = await fetch("https://api.hypixel.net/skyblock/bazaar", {
            cache: "no-store"
        });

        if(!res.ok) throw new Error("HTTP ERROR");

        const data = await res.json();

        if(!data || !data.products) {
            throw new Error("INVALID DATA");
        }

        return data.products;

    } catch (e) {
        console.error("API FAIL:", e);
        document.getElementById("status").innerText = "⚠ API ERROR (retrying)";
        return null;
    }
}

/* =========================
   ANALYSIS
========================= */
function calcFlip(stats){
    const buy = stats.sellPrice;
    const sell = stats.buyPrice;

    if(!buy || !sell) return null;

    const profit = (sell - buy) - (sell * TAX);
    const roi = (profit / buy) * 100;

    return { buy, profit, roi };
}

/* =========================
   HISTORY + TREND
========================= */
function trend(history){
    if(history.length < 10) return 0;

    let change = 0;
    for(let i=1;i<history.length;i++){
        change += history[i].price - history[i-1].price;
    }

    return change / history.length;
}

/* =========================
   CHART (SAFE)
========================= */
function renderChart(item){

    let h = getHistory(item).slice(-50);

    if(h.length === 0) return;

    let labels = h.map(x => new Date(x.time).toLocaleTimeString());
    let data = h.map(x => x.price);

    if(!chart){
        chart = new Chart(document.getElementById("chart"),{
            type:"line",
            data:{
                labels,
                datasets:[{
                    label:item,
                    data,
                    borderColor:"#00ff99",
                    fill:false
                }]
            }
        });
    } else {
        chart.data.labels = labels;
        chart.data.datasets[0].data = data;
        chart.update();
    }
}

/* =========================
   MAIN LOAD
========================= */
async function load(){

    const products = await getBazaar();
    if(!products) return;

    let items = [];

    for(const id in products){

        const s = products[id].quick_status;
        if(!s) continue;

        const flip = calcFlip(s);
        if(!flip) continue;

        if(s.sellMovingWeek < 100000) continue;

        const name = id.replaceAll("_"," ");

        saveHistory(name, flip.buy);

        items.push({
            name,
            price: flip.buy,
            roi: flip.roi
        });
    }

    items.sort((a,b)=>b.roi-a.roi);
    items = items.slice(0,15);

    marketItems = items;

    render(items);

    document.getElementById("status").innerText =
        "🟢 LIVE " + new Date().toLocaleTimeString();
}

/* =========================
   RENDER UI
========================= */
function render(items){

    const table = document.getElementById("table");
    const select = document.getElementById("itemSelect");

    table.innerHTML = `
        <tr><th>Item</th><th>Price</th><th>ROI</th></tr>
    `;

    select.innerHTML = "";

    items.forEach((i,idx)=>{

        table.innerHTML += `
        <tr>
            <td>${i.name}</td>
            <td>${i.price.toFixed(1)}</td>
            <td>${i.roi.toFixed(2)}%</td>
        </tr>`;

        const opt = document.createElement("option");
        opt.value = i.name;
        opt.text = i.name;
        select.appendChild(opt);

        if(idx === 0){
            renderChart(i.name);
        }
    });
}

/* =========================
   CHART UPDATE
========================= */
function updateCharts(){
    const item = document.getElementById("itemSelect").value;
    renderChart(item);
}

/* =========================
   STABLE LOOP (5 SEC)
========================= */
async function loop(){
    await load();
    setTimeout(loop, 5000);
}

loop();

</script>

</body>
</html>
