<!DOCTYPE html>
<html>
<head>
    <title>Pro Bazaar Trading Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    background:#0b0f14;
    color:#e6e6e6;
    margin:0;
}

.header{
    padding:15px;
    background:#111827;
    border-bottom:1px solid #222;
}

.container{
    display:grid;
    grid-template-columns:280px 1fr;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    background:#0f172a;
    padding:10px;
    border-right:1px solid #222;
}

.sidebar select,
.sidebar input{
    width:100%;
    padding:8px;
    background:#111827;
    color:white;
    border:none;
    margin-bottom:8px;
}

/* MAIN */
.main{
    padding:15px;
}

.kpis{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.card{
    flex:1;
    background:#111827;
    padding:10px;
    border-radius:8px;
    border:1px solid #222;
}

.card h3{
    margin:0;
    font-size:12px;
    color:#9ca3af;
}

.card p{
    margin:5px 0 0;
    font-size:16px;
}

.best{
    background:#111827;
    padding:10px;
    border-left:4px solid #00ff88;
    margin-bottom:10px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#0f172a;
}

th,td{
    padding:8px;
    border-bottom:1px solid #222;
    text-align:center;
}

th{
    background:#111827;
}

.buy{ color:#00ff88; font-weight:bold; }
.wait{ color:#ffcc00; }
.avoid{ color:#ff4444; }

canvas{
    margin-top:10px;
    background:#0f172a;
    border-radius:8px;
    padding:10px;
}

.itemRow{
    padding:8px;
    border-bottom:1px solid #222;
    cursor:pointer;
}
.itemRow:hover{ background:#111827; }

#allItems{
    max-height:250px;
    overflow:auto;
    background:#0f172a;
    border:1px solid #222;
    border-radius:8px;
}
</style>

</head>

<body>

<div class="header">
    <h2>🤖 Pro Bazaar Trading Terminal</h2>
    <span id="status">Loading...</span>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

    <h3>🎯 Item</h3>
    <select id="itemSelect" onchange="updateCharts()"></select>

    <h3>🔍 Search</h3>
    <input id="search" placeholder="Search item...">

    <h3>📦 All Items</h3>
    <div id="allItems"></div>

</div>

<!-- MAIN -->
<div class="main">

    <div class="kpis">
        <div class="card">
            <h3>🔥 Best ROI</h3>
            <p id="bestROI">-</p>
        </div>

        <div class="card">
            <h3>📉 Market</h3>
            <p id="marketStatus">-</p>
        </div>

        <div class="card">
            <h3>⚡ Trades</h3>
            <p id="tradeCount">0</p>
        </div>
    </div>

    <div class="best" id="bestTrade">Loading...</div>

    <h3>📊 24H Trend</h3>
    <canvas id="dayChart"></canvas>

    <h3>📈 7 Day Trend</h3>
    <canvas id="weekChart"></canvas>

    <h3>📊 Top AI Trades</h3>
    <table id="table"></table>

</div>
</div>

<script>

const TAX = 0.01125;

let dayChart, weekChart;
let allMarketItems = [];

/* =========================
   HISTORY
========================= */
function saveHistory(item, price){
    let data = JSON.parse(localStorage.getItem(item) || "[]");
    data.push({ time: Date.now(), price });
    if (data.length > 500) data.shift();
    localStorage.setItem(item, JSON.stringify(data));
}

function getHistory(item){
    return JSON.parse(localStorage.getItem(item) || "[]");
}

/* =========================
   REGRESSION
========================= */
function regression(h){
    if(h.length < 10) return null;

    let n=h.length,sx=0,sy=0,sxy=0,sxx=0;

    for(let i=0;i<n;i++){
        sx+=i;
        sy+=h[i].price;
        sxy+=i*h[i].price;
        sxx+=i*i;
    }

    return (n*sxy - sx*sy)/(n*sxx - sx*sx)*n + (sy - ((n*sxy - sx*sy)/(n*sxx - sx*sx))*sx)/n;
}

/* =========================
   TREND
========================= */
function trend(h){
    let s=regression(h.slice(-10));
    let l=regression(h.slice(-50));

    if(s>l*1.01) return "UP";
    if(s<l*0.99) return "DOWN";
    return "STABLE";
}

/* =========================
   PUMP
========================= */
function pump(h){
    let avg=h.reduce((a,b)=>a+b.price,0)/h.length;
    return h[h.length-1].price>avg*1.25;
}

/* =========================
   SCORE
========================= */
function score(item,h){
    let t=trend(h);
    let s=item.roi*0.5;

    if(t==="UP") s+=20;
    if(t==="DOWN") s-=30;
    if(pump(h)) s-=50;

    return s;
}

/* =========================
   SIGNAL
========================= */
function signal(item,h){
    let p=regression(h);
    let c=h[h.length-1].price;

    if(pump(h)) return "❌ MANIPULATION";
    if(p && p>c*1.02) return "🟢 BUY EARLY";
    if(item.roi>5) return "🟡 WAIT";
    return "❌ AVOID";
}

/* =========================
   CHART UPDATE (NO RESET)
========================= */
function updateCharts(){
    let i=document.getElementById("itemSelect").value;
    let h=getHistory(i).slice(-50);

    let labels=h.map(x=>new Date(x.time).toLocaleTimeString());
    let data=h.map(x=>x.price);

    if(!dayChart){
        dayChart=new Chart(document.getElementById("dayChart"),{
            type:"line",
            data:{labels,datasets:[{data,borderColor:"#00ff99"}]}
        });
    } else {
        dayChart.data.labels=labels;
        dayChart.data.datasets[0].data=data;
        dayChart.update();
    }
}

/* =========================
   ALL ITEMS
========================= */
function renderAll(items){
    let box=document.getElementById("allItems");
    box.innerHTML="";

    items.forEach(i=>{
        let div=document.createElement("div");
        div.className="itemRow";

        div.innerHTML=`<b>${i.name}</b><br><small>${i.price.toFixed(1)} | ${i.roi.toFixed(2)}%</small>`;

        div.onclick=()=>{
            document.getElementById("itemSelect").value=i.name;
            updateCharts();
        };

        box.appendChild(div);
    });
}

/* =========================
   LOAD
========================= */
async function load(){
    let res=await fetch("https://api.hypixel.net/skyblock/bazaar");
    let data=await res.json();

    let items=[];

    for(let id in data.products){
        let s=data.products[id].quick_status;

        let buy=s.sellPrice;
        let sell=s.buyPrice;

        if(buy<=0||sell<=0)continue;

        let profit=(sell-buy)-(sell*TAX);
        let roi=(profit/buy)*100;

        if(s.sellMovingWeek<100000)continue;

        let name=id.replaceAll("_"," ");

        saveHistory(name,buy);

        let h=getHistory(name);

        items.push({
            name,
            price:buy,
            roi,
            score:score({roi},h),
            signal:signal({roi},h)
        });
    }

    allMarketItems=items.slice();
    renderAll(allMarketItems);

    let crash=items.reduce((a,i)=>a+i.roi,0)/items.length<-2;

    items.sort((a,b)=>b.score-a.score);
    items=items.slice(0,15);

    render(items,crash);
}

/* =========================
   RENDER TOP
========================= */
function render(items,crash){

    document.getElementById("status").innerText=
        crash?"🚨 MARKET CRASH":"🟢 LIVE";

    document.getElementById("bestROI").innerText=
        items[0]?.roi.toFixed(2)+"%"||"-";

    document.getElementById("bestTrade").innerHTML=
        "🔥 BEST: <b>"+items[0]?.name+"</b>";

    let table=document.getElementById("table");
    let select=document.getElementById("itemSelect");

    table.innerHTML=`<tr><th>Item</th><th>Price</th><th>ROI</th><th>Score</th><th>Signal</th></tr>`;
    select.innerHTML="";

    items.forEach((i,idx)=>{

        table.innerHTML+=`
        <tr>
            <td>${i.name}</td>
            <td>${i.price.toFixed(1)}</td>
            <td>${i.roi.toFixed(2)}</td>
            <td>${i.score.toFixed(1)}</td>
            <td>${i.signal}</td>
        </tr>`;

        let opt=document.createElement("option");
        opt.value=i.name;
        opt.text=i.name;
        select.appendChild(opt);

        if(idx===0) updateCharts();
    });

    document.getElementById("marketStatus").innerText=
        crash?"CRASH":"STABLE";
}

/* =========================
   SEARCH
========================= */
document.getElementById("search").addEventListener("input",e=>{
    let v=e.target.value.toLowerCase();

    renderAll(allMarketItems.filter(i=>
        i.name.toLowerCase().includes(v)
    ));
});

/* =========================
   LOOP (NO PAGE REFRESH)
========================= */
async function loop(){
    await load();
    setTimeout(loop,3000);
}

loop();

</script>

</body>
</html>
