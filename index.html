<!DOCTYPE html>
<html>
<head>
    <title>Pro AI Bazaar Trader</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial; background:#111; color:#eee; text-align:center; }
        table { margin:auto; width:92%; border-collapse:collapse; }
        th, td { padding:10px; border-bottom:1px solid #444; }
        th { background:#222; }
        canvas { max-width:900px; margin:20px auto; }

        .buy { color:#00ff88; }
        .wait { color:#ffcc00; }
        .avoid { color:#ff4444; }
    </style>
</head>

<body>

<h1>🤖 Pro AI Bazaar Trader</h1>
<h3 id="status">Loading...</h3>

<select id="itemSelect" onchange="updateCharts()"></select>

<h2>📊 24H Trend</h2>
<canvas id="dayChart"></canvas>

<h2>📈 7 Day Trend</h2>
<canvas id="weekChart"></canvas>

<table id="table">
<tr>
    <th>Item</th>
    <th>Price</th>
    <th>ROI</th>
    <th>Score</th>
    <th>Prediction</th>
    <th>Signal</th>
</tr>
</table>

<script>

const TAX = 0.01125;
let dayChart, weekChart;

/* =========================
   💾 HISTORY SYSTEM
========================= */
function saveHistory(item, price){
    let data = JSON.parse(localStorage.getItem(item) || "[]");
    data.push({ time: Date.now(), price });
    if (data.length > 500) data.shift();
    localStorage.setItem(item, JSON.stringify(data));
}

function getHistory(item){
    return JSON.parse(localStorage.getItem(item) || "[]");
}

/* =========================
   📉 REGRESSION MODEL
========================= */
function regression(history){
    if (history.length < 10) return null;

    let n = history.length;
    let sx=0, sy=0, sxy=0, sxx=0;

    for(let i=0;i<n;i++){
        let x=i, y=history[i].price;
        sx+=x; sy+=y; sxy+=x*y; sxx+=x*x;
    }

    let slope = (n*sxy - sx*sy)/(n*sxx - sx*sx);
    let intercept = (sy - slope*sx)/n;

    return slope*n + intercept;
}

/* =========================
   🧠 MULTI TREND
========================= */
function multiTrend(history){
    const short = regression(history.slice(-10));
    const long = regression(history.slice(-50));
    return { short, long };
}

/* =========================
   📉 PUMP DETECTION
========================= */
function detectPump(history){
    if (history.length < 10) return false;

    const last = history[history.length-1].price;
    const avg = history.reduce((a,b)=>a+b.price,0)/history.length;

    return last > avg * 1.25;
}

/* =========================
   📊 VOLATILITY / RISK
========================= */
function volatility(history){
    let avg = history.reduce((a,b)=>a+b.price,0)/history.length;

    let variance = history.reduce((a,p)=>
        a + Math.pow(p.price-avg,2),0)/history.length;

    return Math.sqrt(variance);
}

/* =========================
   📈 SMART SCORE
========================= */
function score(item, history){
    const trend = multiTrend(history);
    const vol = volatility(history);

    let s = 0;

    s += item.roi * 0.5;

    if (trend.short > trend.long) s += 20;
    if (trend.short > history[history.length-1].price) s += 15;

    if (vol < item.price * 0.05) s += 10;

    if (detectPump(history)) s -= 40;

    return s;
}

/* =========================
   🤖 SIGNAL ENGINE
========================= */
function signal(item, history){
    const pred = regression(history);
    const current = history[history.length-1].price;

    if (detectPump(history)) return "❌ MANIPULATION";

    if (pred && pred > current * 1.02 && item.roi > 5)
        return "🟢 BUY EARLY";

    if (pred && pred > current)
        return "🟢 BUY";

    if (item.roi > 5)
        return "🟡 WAIT";

    return "❌ AVOID";
}

/* =========================
   📊 CHARTS
========================= */
function draw(id, history){
    if (!history.length) return;

    return new Chart(document.getElementById(id), {
        type:"line",
        data:{
            labels:history.map(x=>new Date(x.time).toLocaleTimeString()),
            datasets:[{
                data:history.map(x=>x.price),
                borderColor:"#00ff99",
                fill:false
            }]
        }
    });
}

function updateCharts(){
    const item = document.getElementById("itemSelect").value;
    const h = getHistory(item);

    if(dayChart) dayChart.destroy();
    if(weekChart) weekChart.destroy();

    dayChart = draw("dayChart", h.slice(-50));
    weekChart = draw("weekChart", h);
}

/* =========================
   🚀 MAIN LOOP
========================= */
async function load(){
    document.getElementById("status").innerText = "Fetching...";

    const res = await fetch("https://api.hypixel.net/skyblock/bazaar");
    const data = await res.json();

    let items = [];

    for (const id in data.products){
        const stats = data.products[id].quick_status;

        const buy = stats.sellPrice;
        const sell = stats.buyPrice;

        if (buy <= 0 || sell <= 0) continue;

        const profit = (sell - buy) - (sell * TAX);
        const roi = (profit / buy) * 100;

        if (stats.sellMovingWeek < 100000) continue;

        const name = id.replaceAll("_"," ");

        saveHistory(name, buy);

        const history = getHistory(name);

        const sc = score({ roi, price: buy }, history);
        const sig = signal({ roi }, history);

        items.push({
            name,
            price: buy,
            roi,
            score: sc,
            signal: sig
        });
    }

    items.sort((a,b)=>b.score-a.score);
    items = items.slice(0, 15);

    render(items);

    document.getElementById("status").innerText =
        "Updated " + new Date().toLocaleTimeString();
}

/* =========================
   🧾 RENDER
========================= */
function render(items){
    const table = document.getElementById("table");
    const select = document.getElementById("itemSelect");

    table.innerHTML = `
        <tr>
            <th>Item</th>
            <th>Price</th>
            <th>ROI</th>
            <th>Score</th>
            <th>Signal</th>
        </tr>
    `;

    select.innerHTML = "";

    items.forEach((i,idx)=>{

        table.innerHTML += `
            <tr>
                <td>${i.name}</td>
                <td>${i.price.toFixed(1)}</td>
                <td>${i.roi.toFixed(2)}</td>
                <td>${i.score.toFixed(1)}</td>
                <td class="${i.signal.includes('BUY')?'buy':i.signal.includes('WAIT')?'wait':'avoid'}">
                    ${i.signal}
                </td>
            </tr>
        `;

        const opt = document.createElement("option");
        opt.value = i.name;
        opt.text = i.name;
        select.appendChild(opt);

        if(idx === 0) updateCharts();
    });
}

/* =========================
   ⚡ FAST LOOP
========================= */
async function loop(){
    await load();
    setTimeout(loop, 3000);
}

loop();

</script>

</body>
</html>
