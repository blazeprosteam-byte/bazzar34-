<!DOCTYPE html>
<html>
<head>
    <title>Pro Bazaar Trading Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    background:#0b0f14;
    color:#e6e6e6;
    margin:0;
}

.header{
    padding:15px;
    background:#111827;
    border-bottom:1px solid #222;
}

.container{
    display:grid;
    grid-template-columns:280px 1fr;
    height:100vh;
}

.sidebar{
    background:#0f172a;
    padding:10px;
    border-right:1px solid #222;
}

.sidebar select,
.sidebar button{
    width:100%;
    padding:8px;
    background:#111827;
    color:white;
    border:none;
    margin-bottom:8px;
    cursor:pointer;
}

.toggle{
    padding:8px;
    background:#111827;
    margin-bottom:10px;
    border:1px solid #333;
    cursor:pointer;
    text-align:center;
    border-radius:6px;
}

.main{
    padding:15px;
}

.kpis{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.card{
    flex:1;
    background:#111827;
    padding:10px;
    border-radius:8px;
    border:1px solid #222;
}

.card h3{
    margin:0;
    font-size:12px;
    color:#9ca3af;
}

.card p{
    margin:5px 0 0;
    font-size:16px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#0f172a;
}

th,td{
    padding:8px;
    border-bottom:1px solid #222;
    text-align:center;
}

th{
    background:#111827;
}

canvas{
    margin-top:10px;
    background:#0f172a;
    border-radius:8px;
    padding:10px;
}
</style>

</head>

<body>

<div class="header">
    <h2>🤖 Pro Bazaar Trading Terminal</h2>
    <span id="status">Loading...</span>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="toggle" onclick="toggleManipulation()">
        🧠 Show Manipulation: <span id="manState">ON</span>
    </div>

    <select id="itemSelect" onchange="updateCharts()"></select>

</div>

<!-- MAIN -->
<div class="main">

    <div class="kpis">
        <div class="card">
            <h3>🔥 Best Profit/Hour</h3>
            <p id="bestPH">-</p>
        </div>

        <div class="card">
            <h3>📊 Items</h3>
            <p id="itemCount">0</p>
        </div>
    </div>

    <h3>📊 Top AI Bazaar Flips (Profit/Hour)</h3>
    <table id="table"></table>

</div>
</div>

<script>

const TAX = 0.01125;

let allMarketItems = [];
let showManipulation = true;

/* =========================
   TOGGLE MANIPULATION
========================= */
function toggleManipulation(){
    showManipulation = !showManipulation;
    document.getElementById("manState").innerText =
        showManipulation ? "ON" : "OFF";
}

/* =========================
   HISTORY
========================= */
function saveHistory(item, price){
    if(!item || !price) return;

    let data = JSON.parse(localStorage.getItem(item) || "[]");
    data.push({ time: Date.now(), price });

    if (data.length > 300) data.shift();

    localStorage.setItem(item, JSON.stringify(data));
}

function getHistory(item){
    return JSON.parse(localStorage.getItem(item) || "[]");
}

/* =========================
   AI CORE
========================= */
function regression(h){
    if(!h || h.length < 10) return null;

    let n=h.length,sx=0,sy=0,sxy=0,sxx=0;

    for(let i=0;i<n;i++){
        sx+=i;
        sy+=h[i].price;
        sxy+=i*h[i].price;
        sxx+=i*i;
    }

    let denom = (n*sxx - sx*sx);
    if(denom === 0) return null;

    let slope = (n*sxy - sx*sy)/denom;
    let intercept = (sy - slope*sx)/n;

    return slope*n + intercept;
}

function trend(h){
    let s=regression(h.slice(-10));
    let l=regression(h.slice(-50));

    if(!s || !l) return "STABLE";

    if(s>l*1.01) return "UP";
    if(s<l*0.99) return "DOWN";
    return "STABLE";
}

function pump(h){
    if(!h.length) return false;
    let avg=h.reduce((a,b)=>a+b.price,0)/h.length;
    return h[h.length-1].price > avg*1.25;
}

/* =========================
   PROFIT PER HOUR (NEW)
========================= */
function profitPerHour(item, h, roi){

    if(!h || h.length === 0) return 0;

    let lastPrice = h[h.length-1].price;

    let profit = lastPrice * (roi/100);

    let hourlyVolume = (h.length > 0 ? 1 : 1);

    let avgVolumePerHour = 1000;

    return profit * avgVolumePerHour;
}

/* =========================
   SCORE
========================= */
function score(item,h){
    let t=trend(h);
    let s=item.roi*0.5;

    if(t==="UP") s+=20;
    if(t==="DOWN") s-=30;
    if(pump(h)) s-=50;

    return s;
}

/* =========================
   SIGNAL
========================= */
function signal(item,h){
    let p=regression(h);
    let c=h[h.length-1].price;

    if(pump(h)) return "❌ MANIPULATION";
    if(p && p>c*1.02) return "🟢 BUY EARLY";
    if(item.roi>5) return "🟡 WAIT";
    return "❌ AVOID";
}

/* =========================
   LOAD
========================= */
async function load(){

    try{

        let res = await fetch("https://api.hypixel.net/skyblock/bazaar");
        let data = await res.json();

        let items = [];

        for(let id in data.products){

            let s = data.products[id].quick_status;
            if(!s) continue;

            let buy = s.sellPrice;
            let sell = s.buyPrice;

            if(!buy || !sell) continue;

            let profit = (sell-buy)-(sell*TAX);
            let roi = (profit/buy)*100;

            if(s.sellMovingWeek < 100000) continue;

            let name = id.replaceAll("_"," ");

            saveHistory(name, buy);

            let h = getHistory(name);

            let sig = signal({roi},h);

            let ppH = profitPerHour({roi}, h, roi);

            if(!showManipulation && sig.includes("MANIPULATION")) continue;

            items.push({
                name,
                price: buy,
                roi,
                score: score({roi},h),
                signal: sig,
                pph: ppH
            });
        }

        allMarketItems = items.slice();

        items.sort((a,b)=>b.pph-a.pph);
        items = items.slice(0,10);

        render(items);

        document.getElementById("status").innerText="🟢 LIVE";

    } catch(e){
        console.log(e);
        document.getElementById("status").innerText="⚠ API ERROR";
    }
}

/* =========================
   RENDER
========================= */
function render(items){

    let table=document.getElementById("table");

    table.innerHTML=`
    <tr>
        <th>Item</th>
        <th>Price</th>
        <th>ROI</th>
        <th>Profit/Hour</th>
        <th>Signal</th>
    </tr>`;

    let best = items[0];

    document.getElementById("bestPH").innerText =
        best ? best.pph.toFixed(2) : "-";

    items.forEach(i=>{

        table.innerHTML+=`
        <tr>
            <td>${i.name}</td>
            <td>${i.price.toFixed(1)}</td>
            <td>${i.roi.toFixed(2)}</td>
            <td>${i.pph.toFixed(2)}</td>
            <td>${i.signal}</td>
        </tr>`;
    });

    document.getElementById("itemCount").innerText = items.length;
}

/* =========================
   LOOP (5s STABLE)
========================= */
async function loop(){
    await load();
    setTimeout(loop, 5000);
}

loop();

</script>

</body>
</html>
