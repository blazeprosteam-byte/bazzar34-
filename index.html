<!DOCTYPE html>
<html>
<head>
    <title>AI Bazaar Trader (GitHub Edition)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial; background:#111; color:#eee; text-align:center; }
        table { margin:auto; width:90%; border-collapse:collapse; }
        th, td { padding:10px; border-bottom:1px solid #444; }
        th { background:#222; }
        canvas { max-width:900px; margin:20px auto; }

        .buy { color:#00ff88; }
        .wait { color:#ffcc00; }
        .avoid { color:#ff4444; }
    </style>
</head>
<body>

<h1>🤖 AI Bazaar Trader (GitHub)</h1>
<h3 id="status">Loading...</h3>

<select id="itemSelect" onchange="updateCharts()"></select>

<h2>📊 Daily Chart</h2>
<canvas id="dayChart"></canvas>

<h2>📈 7 Day Chart</h2>
<canvas id="weekChart"></canvas>

<table id="table">
<tr>
    <th>Item</th><th>Price</th><th>ROI</th>
    <th>Prediction</th><th>Signal</th>
</tr>
</table>

<script>
const TAX = 0.01125;
const MIN_VOLUME = 100000;

let dayChart, weekChart;

/* ---------------- HISTORY ---------------- */
function saveHistory(item, price){
    let data = JSON.parse(localStorage.getItem(item) || "[]");
    data.push({ time: Date.now(), price });
    if (data.length > 500) data.shift();
    localStorage.setItem(item, JSON.stringify(data));
}

function getHistory(item){
    return JSON.parse(localStorage.getItem(item) || "[]");
}

/* ---------------- REGRESSION ---------------- */
function regression(history){
    if (history.length < 10) return null;

    let n = history.length;
    let sx=0, sy=0, sxy=0, sxx=0;

    for(let i=0;i<n;i++){
        let x=i;
        let y=history[i].price;
        sx+=x; sy+=y; sxy+=x*y; sxx+=x*x;
    }

    let slope = (n*sxy - sx*sy)/(n*sxx - sx*sx);
    let intercept = (sy - slope*sx)/n;

    return slope*n + intercept;
}

/* ---------------- SIGNAL ---------------- */
function getSignal(item, history){
    const pred = regression(history);
    if (!pred) return "WAIT";

    const current = history[history.length-1].price;

    if (pred > current * 1.02 && item.roi > 5)
        return "🟢 BUY EARLY";

    if (pred > current)
        return "🟢 BUY";

    if (item.roi > 5)
        return "🟡 WAIT";

    return "❌ AVOID";
}

/* ---------------- FLIP CALC ---------------- */
function calc(stats){
    const buy = stats.sellPrice;
    const sell = stats.buyPrice;

    if (buy <= 0 || sell <= 0) return null;

    const profit = (sell - buy) - (sell * TAX);
    if (profit <= 0) return null;

    const roi = (profit / buy) * 100;

    return { price: buy, roi };
}

/* ---------------- CHART ---------------- */
function drawChart(canvasId, history){
    if (!history.length) return;

    return new Chart(document.getElementById(canvasId), {
        type:"line",
        data:{
            labels:history.map(x=>new Date(x.time).toLocaleTimeString()),
            datasets:[{
                data:history.map(x=>x.price),
                borderColor:"#00ff99"
            }]
        }
    });
}

function updateCharts(){
    const item = document.getElementById("itemSelect").value;
    const history = getHistory(item);

    if(dayChart) dayChart.destroy();
    if(weekChart) weekChart.destroy();

    dayChart = drawChart("dayChart", history.slice(-50));
    weekChart = drawChart("weekChart", history);
}

/* ---------------- MAIN LOAD ---------------- */
async function load(){
    document.getElementById("status").innerText = "Fetching Bazaar...";

    try{
        const res = await fetch("https://api.hypixel.net/skyblock/bazaar");
        const data = await res.json();

        let results = [];

        for (const id in data.products){
            const stats = data.products[id].quick_status;

            if (stats.sellMovingWeek < MIN_VOLUME) continue;

            const flip = calc(stats);
            if (!flip) continue;

            const name = id.replaceAll("_"," ");

            saveHistory(name, flip.price);

            const history = getHistory(name);
            const signal = getSignal(flip, history);

            results.push({
                name,
                ...flip,
                signal
            });
        }

        results.sort((a,b)=>b.roi-a.roi);
        results = results.slice(0, 15);

        render(results);

        document.getElementById("status").innerText =
            "Updated: " + new Date().toLocaleTimeString();

    }catch(e){
        document.getElementById("status").innerText = "API Error";
    }
}

/* ---------------- RENDER ---------------- */
function render(items){
    const table = document.getElementById("table");
    const select = document.getElementById("itemSelect");

    table.innerHTML = `
        <tr>
            <th>Item</th><th>Price</th><th>ROI</th>
            <th>Signal</th>
        </tr>
    `;

    select.innerHTML = "";

    items.forEach((item,i)=>{

        table.innerHTML += `
            <tr>
                <td>${item.name}</td>
                <td>${item.price.toFixed(1)}</td>
                <td>${item.roi.toFixed(2)}</td>
                <td class="${item.signal.includes('BUY')?'buy':item.signal.includes('WAIT')?'wait':'avoid'}">
                    ${item.signal}
                </td>
            </tr>
        `;

        const opt = document.createElement("option");
        opt.value = item.name;
        opt.text = item.name;
        select.appendChild(opt);

        if(i===0) updateCharts();
    });
}

/* ⚡ FAST LOOP (GitHub safe) */
async function loop(){
    await load();
    setTimeout(loop, 3000); // fastest safe polling
}

loop();
</script>

</body>
</html>
